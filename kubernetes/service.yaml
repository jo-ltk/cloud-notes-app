# service.yaml — gives your pods a stable name and a way to reach them
#
# Service = stable network endpoint for pods that match the selector.
# type: NodePort = expose the app on a fixed port on each cluster node (good for Minikube).
#
# port       — port the Service listens on inside the cluster (other pods use this)
# targetPort — port on the container (must match containerPort in deployment.yaml)
# nodePort   — port on the node you open in the browser (Minikube: minikube service ...)
#
# Apply: kubectl apply -f kubernetes/service.yaml
# -----------------------------------------------------------------------------
---
# Backend Service — routes traffic to pods labeled app: cloud-notes-backend
apiVersion: v1
kind: Service
metadata:
  name: cloud-notes-backend
spec:
  type: NodePort
  selector:
    app: cloud-notes-backend
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30500
---
# Frontend Service — routes traffic to pods labeled app: cloud-notes-frontend
apiVersion: v1
kind: Service
metadata:
  name: cloud-notes-frontend
spec:
  type: NodePort
  selector:
    app: cloud-notes-frontend
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30300
