# NodePort services expose apps outside the cluster (learning/demo)
---
apiVersion: v1
kind: Service
metadata:
  name: cloud-notes-backend
spec:
  type: NodePort
  selector:
    app: cloud-notes-backend
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30500
---
apiVersion: v1
kind: Service
metadata:
  name: cloud-notes-frontend
spec:
  type: NodePort
  selector:
    app: cloud-notes-frontend
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30300
