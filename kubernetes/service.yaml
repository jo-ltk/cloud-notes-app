# -----------------------------------------------------------------------------
# service.yaml — stable network access to your Deployments
# -----------------------------------------------------------------------------
# Service: gives pods a stable DNS name and routes traffic to them.
# selector: must match pod labels in deployment.yaml (app: ...).
# ports:
#   port        — port the Service listens on inside the cluster
#   targetPort  — port on the container (must match containerPort)
#   nodePort    — port on each node (NodePort type exposes app externally)
# -----------------------------------------------------------------------------
---
apiVersion: v1
kind: Service
metadata:
  name: cloud-notes-backend
spec:
  type: NodePort
  selector:
    app: cloud-notes-backend
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30500
---
apiVersion: v1
kind: Service
metadata:
  name: cloud-notes-frontend
spec:
  type: NodePort
  selector:
    app: cloud-notes-frontend
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30300
