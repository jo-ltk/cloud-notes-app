# deployment.yaml — tells Kubernetes HOW to run your app
#
# Images are pulled from Docker Hub (built & pushed by GitHub Actions).
# Replace YOUR_DOCKERHUB_USERNAME with your real Docker Hub username.
#
# Apply: kubectl apply -f kubernetes/deployment.yaml
# -----------------------------------------------------------------------------
---
# Backend — Flask API on port 5000
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-notes-backend
  labels:
    app: cloud-notes-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloud-notes-backend
  template:
    metadata:
      labels:
        app: cloud-notes-backend
    spec:
      containers:
        - name: backend
          # Example: johndoe/cloud-notes-backend:latest
          image: YOUR_DOCKERHUB_USERNAME/cloud-notes-backend:latest
          # Always pull from registry so new :latest builds are picked up
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: DATABASE_PATH
              value: /app/database.db
---
# Frontend — Next.js on port 3000
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-notes-frontend
  labels:
    app: cloud-notes-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloud-notes-frontend
  template:
    metadata:
      labels:
        app: cloud-notes-frontend
    spec:
      containers:
        - name: frontend
          # Example: johndoe/cloud-notes-frontend:latest
          image: YOUR_DOCKERHUB_USERNAME/cloud-notes-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            # Baked in at image build time; kept for documentation
            - name: NEXT_PUBLIC_API_URL
              value: http://cloud-notes-backend:5000
