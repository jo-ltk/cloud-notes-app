# deployment.yaml — tells Kubernetes HOW to run your app
#
# Deployment = "I want N copies of this container running."
# replicas: 2 = two pods per app (demo for scaling / availability)
# selector + labels = how the Service finds these pods
# containers = which Docker image, which port, env vars
#
# Apply: kubectl apply -f kubernetes/deployment.yaml
# -----------------------------------------------------------------------------
---
# Backend — Flask API on port 5000
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-notes-backend
  labels:
    app: cloud-notes-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloud-notes-backend
  template:
    metadata:
      labels:
        app: cloud-notes-backend
    spec:
      containers:
        - name: backend
          image: cloud-notes-app-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          env:
            - name: DATABASE_PATH
              value: /app/database.db
---
# Frontend — Next.js on port 3000
# NEXT_PUBLIC_API_URL uses the backend Service name (DNS inside the cluster)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-notes-frontend
  labels:
    app: cloud-notes-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloud-notes-frontend
  template:
    metadata:
      labels:
        app: cloud-notes-frontend
    spec:
      containers:
        - name: frontend
          image: cloud-notes-app-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: http://cloud-notes-backend:5000
