# ArgoCD Application — GitOps: sync kubernetes/ manifests from Git automatically
# Optional advanced topic; apply after ArgoCD is installed on your cluster.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloud-notes-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_USERNAME/cloud-notes-app.git
    targetRevision: main
    path: kubernetes
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
