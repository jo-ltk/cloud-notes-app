# CI/CD — validate Terraform, build Docker images, push to Docker Hub on main
#
# GitHub repository secrets (Settings → Secrets and variables → Actions):
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY  — Terraform plan
#   DOCKERHUB_USERNAME, DOCKERHUB_TOKEN       — build & push images
#
# Images published (on push to main):
#   <DOCKERHUB_USERNAME>/cloud-notes-backend:latest
#   <DOCKERHUB_USERNAME>/cloud-notes-frontend:latest
name: Cloud Notes CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  TF_WORKING_DIR: terraform

jobs:
  terraform:
    name: Terraform Validate & Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -input=false -var-file=terraform.tfvars -no-color

  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    # Only push when merging to main (PRs still build to verify Dockerfiles)
    env:
      PUSH_IMAGES: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: env.PUSH_IMAGES == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend.Dockerfile
          push: ${{ env.PUSH_IMAGES == 'true' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cloud-notes-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/cloud-notes-backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend.Dockerfile
          push: ${{ env.PUSH_IMAGES == 'true' }}
          build-args: |
            NEXT_PUBLIC_API_URL=http://cloud-notes-backend:5000
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cloud-notes-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/cloud-notes-frontend:${{ github.sha }}
